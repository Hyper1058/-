<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานสรุปสถิติแบบกราฟ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 รายงานสรุปรูปแบบกราฟ</h2>
        <a href="/" class="btn btn-outline-dark fw-bold shadow-sm">⬅️ กลับหน้าหลักบันทึกบัญชี</a>
    </div>

    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white fw-bold text-center">
                    สัดส่วนรายรับ และ รายจ่าย ทั้งหมด
                </div>
                <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 350px;">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-7 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white fw-bold text-center">
                    วิเคราะห์รายจ่าย แยกตามหมวดหมู่ (บาท)
                </div>
                <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 350px;">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const ctxPie = document.getElementById('pieChart').getContext('2d');
    new Chart(ctxPie, {
        type: 'pie',
        data: {
            labels: ['รายรับทั้งหมด (฿)', 'รายจ่ายทั้งหมด (฿)'],
            datasets: [{
                data: [{{ total_income }}, {{ total_expense }}],
                backgroundColor: ['#198754', '#dc3545'],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    const catLabels = {{ chart_labels|tojson }};
    const catValues = {{ chart_values|tojson }};

    const ctxBar = document.getElementById('barChart').getContext('2d');
    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: catLabels,
            datasets: [{
                label: 'ยอดเงินที่จ่ายไป (บาท)',
                data: catValues,
                backgroundColor: '#0dcaf0',
                borderColor: '#0aadce',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
